<!doctype html><html lang=es><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>RiskMathics · Panel de Ventas</title>
<link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lora:ital@0;1&display=swap" rel=stylesheet>
<style>
:root{--navy:#0a1f3c;--oro:#c8a04a;--bg:#eef1f6;--ink:#1a2432;--mut:#7a869a;--line:#e3e8f0}
*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--ink);font-family:Lora,serif}
h1,h2,.cn,.cl,th,.brand,.pill,.badge2{font-family:Poppins,sans-serif}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:9}
.brand{font-weight:700;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:9px}.brand span{color:var(--oro)}
.dot{width:9px;height:9px;border-radius:50%;background:#37d67a;box-shadow:0 0 0 0 rgba(55,214,122,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,214,122,.6)}70%{box-shadow:0 0 0 8px rgba(55,214,122,0)}100%{box-shadow:0 0 0 0 rgba(55,214,122,0)}}
.st{font-size:12px;color:#b9c4d6;display:flex;align-items:center;gap:12px}
.st button{font-family:Poppins;background:var(--oro);color:var(--navy);border:0;border-radius:8px;padding:6px 12px;font-weight:600;cursor:pointer;font-size:12px}
.wrap{max-width:1140px;margin:0 auto;padding:18px 16px 40px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:2px 0 22px}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 3px 14px rgba(10,31,60,.07);text-align:center;position:relative;overflow:hidden}
.card:before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--c)}
.ci{font-size:24px}.cn{font-size:34px;font-weight:700;line-height:1.1;margin:6px 0 2px;color:var(--navy)}
.cl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
.ch{font-size:13px;margin-top:8px;font-weight:600;min-height:18px}
section{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:16px;box-shadow:0 3px 14px rgba(10,31,60,.05)}
h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px;color:var(--navy)}
.badge2{font-size:11px;color:var(--mut);font-weight:500;background:var(--bg);padding:3px 9px;border-radius:20px}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
th{text-align:left;color:var(--navy);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;padding:7px 8px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}tr:hover td{background:#fafbfe}
.muted{color:var(--mut)}.mono{font-variant-numeric:tabular-nums;font-weight:600;color:var(--navy);white-space:nowrap}
.pill{color:#fff;font-size:10px;padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
.empty{text-align:center;padding:22px;color:var(--mut)}
footer{text-align:center;color:var(--mut);font-size:12px;padding:24px 10px}
.lock{max-width:460px;margin:12vh auto;background:#fff;border-radius:16px;padding:34px;text-align:center;box-shadow:0 3px 14px rgba(10,31,60,.1)}
.lock input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;margin:12px 0;font-size:15px}
.lock button{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:11px 20px;font-weight:600;font-family:Poppins;cursor:pointer;width:100%}
@media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}.cn{font-size:26px}.st .lbl{display:none}}
</style></head><body>
<div id=app></div>
<script>
const FN="https://bffdsgvgcvmojobfiuay.supabase.co/functions/v1/panel";
const app=document.getElementById("app");
function getKey(){return new URLSearchParams(location.hash.slice(1)).get("k")||new URLSearchParams(location.search).get("k")||localStorage.getItem("panelk")||"";}
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const short=(s,n)=>{s=String(s??"");return s.length>n?s.slice(0,n)+"…":s;};
const fx=iso=>{if(!iso)return"";const d=new Date(iso),m=new Date(d.getTime()-6*3600*1000);return m.toISOString().slice(5,16).replace("T"," ");};
function poder(p){p=(p||"").toLowerCase();if(/c-level|ceo|cfo|cro|coo|cmo|chief|director general|presidente|founder|dueñ|socio|partner|owner/.test(p))return['#8e44ad','C-LEVEL 👑'];if(/director|vicepresid|\bvp\b|head/.test(p))return['#c8a04a','DIRECTOR ⭐'];if(/gerente|manager|subdirector|jefe|lead|coordinad/.test(p))return['#3a7bd5','GERENCIA 📊'];return p?['#7a869a','ESPECIALISTA 🎯']:['#c3ccd8','—'];}
function pdPill(p){const[c,t]=poder(p);return `<span class=pill style="background:${c}">${t}</span>`;}
function card(icon,label,d,c){return `<div class=card style="--c:${c}"><div class=ci>${icon}</div><div class=cn>${d.total}</div><div class=cl>${label}</div><div class=ch>${d.hoy>0?`<span style="color:${c}">▲ ${d.hoy} hoy</span>`:'<span class=muted>0 hoy</span>'}</div></div>`;}
function tbl(title,icon,heads,rows,rowfn,empty){const b=rows.length?rows.map(rowfn).join(""):`<tr><td colspan=${heads.length}><div class=empty>${empty}</div></td></tr>`;return `<section><h2>${icon} ${title} <span class=badge2>${rows.length} recientes · ${arguments[6]??rows.length} total</span></h2><div class=tw><table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${b}</tbody></table></div></section>`;}
function lock(msg){app.innerHTML=`<div class=lock><div style="font-size:34px">🔒</div><h2 style="justify-content:center">Panel de Ventas RiskMathics</h2><p class=muted>${msg||"Ingresa tu token de acceso"}</p><input id=tk type=password placeholder="token" autofocus><button onclick="(function(){var v=document.getElementById('tk').value.trim();if(v){localStorage.setItem('panelk',v);location.hash='k='+v;load();}})()">Entrar</button></div>`;}
async function load(){
  const k=getKey();if(!k){lock();return;}
  try{
    const r=await fetch(FN+"?k="+encodeURIComponent(k),{cache:"no-store"});
    if(r.status===401){localStorage.removeItem("panelk");lock("Token incorrecto. Intenta de nuevo.");return;}
    const d=await r.json();if(!d.ok)throw new Error(d.error||"error");
    localStorage.setItem("panelk",k);
    render(d);
  }catch(e){app.innerHTML=`<div class=lock><h2 style="justify-content:center">⚠️ Error</h2><p class=muted>${esc(e.message)}</p><button onclick=load()>Reintentar</button></div>`;}
}
function render(d){
  const ins=d.inscripciones,led=d.leads,rep=d.respuestas,spo=d.sponsors;
  const insT=tbl("Inscripciones (pagos)","💳",["Fecha","Curso","Nombre","Monto","Medio","Poder"],ins.rows,r=>`<tr><td class=mono>${fx(r.created_at)}</td><td><b>${esc(short(r.curso,26))}</b></td><td>${esc(short(r.nombre,22))}</td><td class=mono>${esc(r.monto??"")} ${esc(r.moneda??"")}</td><td>${esc(r.medio??"")}</td><td>${pdPill(r.poder_decision)}</td></tr>`,"Aún no hay inscripciones. Cuando alguien pague, aparece aquí al instante.",ins.total);
  const ledT=tbl("Leads (pidieron info)","🙋",["Fecha","Nombre","Empresa","Puesto","Curso","País","✓"],led.rows,r=>`<tr><td class=mono>${fx(r.created_at)}</td><td><b>${esc(short((r.nombre||"")+" "+(r.apellido||""),22))}</b></td><td>${esc(short(r.empresa,20))}</td><td>${esc(short(r.puesto,20))}</td><td>${esc(short(r.curso,16))}</td><td>${esc(r.pais??"")}</td><td>${r.verificado?"✅":"—"}</td></tr>`,"Aún no hay leads. Cuando alguien pida info en un landing, cae aquí.",led.total);
  const repT=tbl("Respuestas a correos","📩",["Fecha","Campaña","De","Asunto","Mensaje"],rep.rows,r=>{const m=String(r.texto||"").match(/^\[([^\]]+)\]/);const camp=m?m[1]:"—";const txt=String(r.texto||"").replace(/^\[[^\]]+\]\s*/,"");return `<tr><td class=mono>${fx(r.created_at)}</td><td><span class=pill style="background:#0a1f3c">${esc(short(camp,20))}</span></td><td>${esc(short(r.de,24))}</td><td>${esc(short(r.asunto,24))}</td><td class=muted>${esc(short(txt,55))}</td></tr>`;},"Aún no hay respuestas. Cuando alguien conteste un correo, aparece aquí.",rep.total);
  const spoT=tbl("Patrocinios","🤝",["Fecha","Empresa","Nombre","Puesto","Mensaje"],spo.rows,r=>`<tr><td class=mono>${fx(r.created_at)}</td><td><b>${esc(short(r.empresa,20))}</b></td><td>${esc(short(r.nombre,20))}</td><td>${esc(short(r.puesto,18))}</td><td class=muted>${esc(short(r.mensaje,48))}</td></tr>`,"Aún no hay leads de patrocinio.",spo.total);
  app.innerHTML=`<header><div class=brand><span class=dot></span>Risk<span>Mathics</span> · Panel de Ventas</div><div class=st><span class=lbl>Actualizado ${fx(d.ts)} CDMX</span><button onclick=load()>↻ Refrescar</button></div></header><div class=wrap><div class=cards>${card("💳","Inscripciones",ins,"#2e9e5b")}${card("🙋","Leads",led,"#c8a04a")}${card("📩","Respuestas",rep,"#3a7bd5")}${card("🤝","Patrocinios",spo,"#8e44ad")}</div>${insT}${ledT}${repT}${spoT}<footer>Fuente de verdad: <b>Supabase</b> · Todo evento cae aquí primero · se refresca solo cada 45s — RiskMathics ops</footer></div>`;
}
load();
setInterval(()=>{if(getKey())load();},45000);
</script></body></html>
